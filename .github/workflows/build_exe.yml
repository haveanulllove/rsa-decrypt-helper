name: Build and Release Windows EXE

on:
  push:
    tags:
      - 'v*' # 当您提交 v1.0 这样的标签时触发
  workflow_dispatch: # 您也可以在 Actions 页面手动点运行

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install cryptography pyinstaller
        
    - name: Build EXE
      run: |
        pyinstaller --onefile --name rsa_tool_windows rsa_tool.py
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/rsa_tool_windows.exe
        tag_name: latest
        name: RSA Tool Release
        body: "这是为您自动生成的 Windows RSA 解密工具 (.exe)"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
